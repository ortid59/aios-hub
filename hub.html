<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIOS Hub — Advisor AI Partners</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1B4FD8;
      --teal: #0AADA8;
      --teal-light: #E6F7F7;
      --gold: #D4A017;
      --gold-light: #FDF5DC;
      --gray-50: #F8F9FB;
      --gray-100: #EFF1F5;
      --gray-200: #D8DCE6;
      --gray-400: #9AA3B5;
      --gray-600: #5A6478;
      --gray-800: #1E2535;
      --white: #FFFFFF;
      --sidebar: 288px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────────────── */
    header {
      height: 52px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: 0 16px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 200;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 100%;
      border-right: 1px solid var(--gray-200);
      width: var(--sidebar);
      flex-shrink: 0;
    }
    .logo-mark {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--teal) 100%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 800; font-size: 12px; letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .logo-text { font-size: 13px; font-weight: 700; color: var(--gray-800); }
    .logo-sub  { font-size: 10px; color: var(--gray-400); margin-top: 1px; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 16px;
    }

    .view-toggle {
      display: flex;
      background: var(--gray-100);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .view-btn {
      padding: 5px 14px;
      border-radius: 6px;
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-600);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .view-btn.active {
      background: var(--white);
      color: var(--blue);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* ── LAYOUT ─────────────────────────────────────── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      background: var(--white);
      border-right: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Category nav */
    .sidebar-nav {
      padding: 14px 10px 10px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--gray-100);
    }
    .nav-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gray-400);
      padding: 0 8px;
      margin-bottom: 5px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--gray-600);
      transition: all 0.12s;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
    }
    .nav-item:hover  { background: var(--gray-50); color: var(--gray-800); }
    .nav-item.active { background: #EEF3FF; color: var(--blue); font-weight: 600; }
    .nav-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
    .nav-count {
      margin-left: auto;
      font-size: 10px;
      font-weight: 700;
      background: var(--gray-100);
      color: var(--gray-400);
      padding: 2px 7px;
      border-radius: 10px;
    }
    .nav-item.active .nav-count { background: rgba(27,79,216,0.12); color: var(--blue); }

    /* Filters */
    .sidebar-filters {
      padding: 10px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%;
      padding: 7px 10px 7px 28px;
      border: 1.5px solid var(--gray-200);
      border-radius: 7px;
      font-size: 12px;
      color: var(--gray-800);
      background: var(--gray-50);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-wrap input:focus { border-color: var(--blue); background: var(--white); }
    .search-wrap input::placeholder { color: var(--gray-400); }
    .search-icon {
      position: absolute;
      left: 9px; top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      font-size: 11px;
      pointer-events: none;
    }
    .filter-row { display: flex; gap: 6px; }
    select.f-input, input[type="date"].f-input {
      flex: 1;
      padding: 6px 8px;
      border: 1.5px solid var(--gray-200);
      border-radius: 7px;
      font-size: 11px;
      color: var(--gray-600);
      background: var(--gray-50);
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
      min-width: 0;
    }
    select.f-input:focus, input[type="date"].f-input:focus {
      border-color: var(--blue);
      background: var(--white);
    }
    .clear-btn {
      padding: 6px 10px;
      border: 1.5px solid var(--gray-200);
      border-radius: 7px;
      font-size: 11px;
      color: var(--gray-400);
      background: var(--gray-50);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
      flex-shrink: 0;
    }
    .clear-btn:hover { border-color: var(--blue); color: var(--blue); }
    .filter-count { font-size: 10px; color: var(--gray-400); padding: 0 2px; }

    /* Page list */
    .page-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }
    .page-list::-webkit-scrollbar { width: 3px; }
    .page-list::-webkit-scrollbar-track { background: transparent; }
    .page-list::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }

    .list-group-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--gray-400);
      padding: 10px 8px 4px;
    }
    .page-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 9px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.12s;
      border: 1.5px solid transparent;
      margin-bottom: 1px;
    }
    .page-item:hover  { background: var(--gray-50); border-color: var(--gray-200); }
    .page-item.active { background: #EEF3FF; border-color: var(--blue); }
    .pi-icon {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .pi-body { flex: 1; min-width: 0; }
    .pi-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-800);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .page-item.active .pi-title { color: var(--blue); }
    .pi-date { font-size: 10px; color: var(--gray-400); margin-top: 1px; }
    .no-results {
      text-align: center;
      padding: 32px 16px;
      color: var(--gray-400);
      font-size: 12px;
    }

    /* ── CONTENT AREA ───────────────────────────────── */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Browse / viewer */
    .viewer-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .viewer-toolbar {
      height: 44px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      flex-shrink: 0;
    }
    .viewer-crumb {
      font-size: 11px;
      color: var(--gray-400);
      flex-shrink: 0;
    }
    .viewer-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-800);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .viewer-open {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 7px;
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-600);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .viewer-open:hover { border-color: var(--blue); color: var(--blue); }
    .viewer-frame { flex: 1; width: 100%; border: none; }
    .viewer-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--gray-400);
      gap: 10px;
      user-select: none;
    }
    .viewer-empty-icon { font-size: 36px; opacity: 0.4; }
    .viewer-empty-text { font-size: 13px; }

    /* Gallery */
    .gallery-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .gallery-panel::-webkit-scrollbar { width: 5px; }
    .gallery-panel::-webkit-scrollbar-track { background: transparent; }
    .gallery-panel::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 4px; }

    .gallery-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--gray-400);
      margin: 18px 0 10px;
    }
    .gallery-section-title:first-child { margin-top: 0; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      margin-bottom: 4px;
    }
    .gallery-card {
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .gallery-card:hover {
      border-color: var(--blue);
      box-shadow: 0 6px 24px rgba(27,79,216,0.12);
      transform: translateY(-2px);
    }
    .gallery-card.active {
      border-color: var(--blue);
      box-shadow: 0 4px 16px rgba(27,79,216,0.14);
    }

    /* Thumbnail */
    .card-thumb {
      width: 100%;
      height: 168px;
      overflow: hidden;
      background: var(--gray-100);
      position: relative;
      flex-shrink: 0;
    }
    .thumb-scaler {
      position: absolute;
      top: 0; left: 0;
      width: 1280px;
      height: 800px;
      transform-origin: top left;
      pointer-events: none;
    }
    .thumb-scaler iframe {
      width: 1280px;
      height: 800px;
      border: none;
      display: block;
    }
    .thumb-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      opacity: 0.5;
    }
    .card-open-btn {
      position: absolute;
      top: 8px; right: 8px;
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.92);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      font-size: 13px;
      color: var(--gray-800);
      opacity: 0;
      transition: opacity 0.15s;
      backdrop-filter: blur(4px);
      border: 1px solid var(--gray-200);
      z-index: 10;
    }
    .gallery-card:hover .card-open-btn { opacity: 1; }

    .card-body { padding: 11px 13px; }
    .card-title {
      font-size: 12.5px;
      font-weight: 700;
      color: var(--gray-800);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
    }
    .card-meta { display: flex; align-items: center; justify-content: space-between; }
    .card-tag {
      font-size: 9.5px; font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .card-date { font-size: 10px; color: var(--gray-400); }

    /* Tag colors */
    .t-dashboard { background: #EEF3FF; color: var(--blue); }
    .t-sales     { background: var(--gold-light); color: #996A00; }
    .t-ops       { background: var(--teal-light); color: #087A76; }
    .t-email     { background: #FFF0F0; color: #C0392B; }
    .t-brief     { background: #F0EEFF; color: #6B3FD4; }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-mark">AA</div>

        <div class="logo-text">Advisor AI Partners</div>
        <div class="logo-sub">AIOS Workspace</div>
      </div>
    </div>
    <div class="header-right">
      <div class="view-toggle">
        <button class="view-btn active" id="btn-browse" onclick="setView('browse')">☰ Browse</button>
        <button class="view-btn" id="btn-gallery" onclick="setView('gallery')">⊞ Gallery</button>
      </div>
    </div>
  </header>

  <div class="main">

    <!-- ── SIDEBAR ── -->
    <div class="sidebar">

      <div class="sidebar-nav">
        <div class="nav-label">Categories</div>
        <button class="nav-item active" id="nav-all"       onclick="setCategory('all')">
          <span class="nav-icon">🏠</span> All Pages
          <span class="nav-count" id="ct-all">0</span>
        </button>
        <button class="nav-item" id="nav-dashboard" onclick="setCategory('dashboard')">
          <span class="nav-icon">📊</span> Dashboards
          <span class="nav-count" id="ct-dashboard">0</span>
        </button>
        <button class="nav-item" id="nav-sales" onclick="setCategory('sales')">
          <span class="nav-icon">💼</span> Sales &amp; Proposals
          <span class="nav-count" id="ct-sales">0</span>
        </button>
        <button class="nav-item" id="nav-ops" onclick="setCategory('ops')">
          <span class="nav-icon">⚙️</span> Operations
          <span class="nav-count" id="ct-ops">0</span>
        </button>
        <button class="nav-item" id="nav-email" onclick="setCategory('email')">
          <span class="nav-icon">✉️</span> Emails
          <span class="nav-count" id="ct-email">0</span>
        </button>
        <button class="nav-item" id="nav-brief" onclick="setCategory('brief')">
          <span class="nav-icon">📅</span> Daily Briefs
          <span class="nav-count" id="ct-brief">0</span>
        </button>
      </div>

      <div class="sidebar-filters">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" id="search-input" placeholder="Search pages…" oninput="applyFilters()">
        </div>
        <div class="filter-row">
          <select class="f-input" id="sort-select" onchange="applyFilters()">
            <option value="date-desc">Newest first</option>
            <option value="date-asc">Oldest first</option>
            <option value="name-asc">Name A–Z</option>
            <option value="name-desc">Name Z–A</option>
          </select>
        </div>
        <div class="filter-row">
          <input type="date" class="f-input" id="date-input" onchange="applyFilters()" title="Filter by date">
          <button class="clear-btn" onclick="clearDate()">Clear</button>
        </div>
        <div class="filter-count" id="filter-count"></div>
      </div>

      <div class="page-list" id="page-list"></div>
    </div>

    <!-- ── CONTENT ── -->
    <div class="content">

      <!-- Browse mode -->
      <div class="viewer-panel" id="viewer-panel">
        <div class="viewer-toolbar">
          <span class="viewer-crumb" id="viewer-crumb" style="display:none;">AIOS Hub /</span>
          <span class="viewer-title" id="viewer-title">Select a page to preview</span>
          <a class="viewer-open" id="viewer-open" href="#" target="_blank" style="display:none;">↗ Open full page</a>
        </div>
        <div class="viewer-empty" id="viewer-empty">
          <div class="viewer-empty-icon">👈</div>
          <div class="viewer-empty-text">Select a page from the sidebar to preview it here</div>
        </div>
        <iframe class="viewer-frame" id="viewer-frame" src="" style="display:none;"></iframe>
      </div>

      <!-- Gallery mode -->
      <div class="gallery-panel" id="gallery-panel" style="display:none;">
        <div id="gallery-content"></div>
      </div>

    </div>
  </div>

      { id:'brief-0407', title:'Daily Brief — Apr 7',  desc:'Daily operating brief for April 7, 2026',  category:'brief', date:'2026-04-07', icon:'📅', bg:'#F0EEFF', url:'daily-brief/2026-04-07.html' },
      { id:'brief-0406', title:'Daily Brief — Apr 6',  desc:'Daily operating brief for April 6, 2026',  category:'brief', date:'2026-04-06', icon:'📅', bg:'#F0EEFF', url:'daily-brief/2026-04-06.html' },
      { id:'brief-0404', title:'Daily Brief — Apr 4',  desc:'Daily operating brief for April 4, 2026',  category:'brief', date:'2026-04-04', icon:'📅', bg:'#F0EEFF', url:'daily-brief/2026-04-04.html' },
      { id:'brief-0403', title:'Daily Brief — Apr 3',  desc:'Daily operating brief for April 3, 2026',  category:'brief', date:'2026-04-03', icon:'📅', bg:'#F0EEFF', url:'daily-brief/2026-04-03.html' },
      { id:'brief-0402', title:'Daily Brief — Apr 2',  desc:'Daily operating brief for April 2, 2026',  category:'brief', date:'2026-04-02', icon:'📅', bg:'#F0EEFF', url:'daily-brief/2026-04-02.html' },
      { id:'brief-0401', title:'Daily Brief — Apr 1',  desc:'Daily operating brief for April 1, 2026',  category:'brief', date:'2026-04-01', icon:'📅', bg:'#F0EEFF', url:'daily-brief/2026-04-01.html' },
    ];

    const CAT_LABEL = {
      dashboard: 'Dashboards',
      sales:     'Sales & Proposals',
      ops:       'Operations',
      email:     'Emails',
      brief:     'Daily Briefs',
    };

    const CAT_ORDER = ['dashboard','sales','ops','email','brief'];

    // ── STATE ─────────────────────────────────────────────────────────────
    let activeCat  = 'all';
    let activeView = 'browse';
    let activePage = null;
    let filtered   = [];

    // ── INIT ──────────────────────────────────────────────────────────────
    (function init() {
      CAT_ORDER.forEach(cat => {
        const n = PAGES.filter(p => p.category === cat).length;
        document.getElementById('ct-' + cat).textContent = n;
      });
      document.getElementById('ct-all').textContent = PAGES.length;
      applyFilters();
    })();

    // ── CATEGORY ──────────────────────────────────────────────────────────
    function setCategory(cat) {
      activeCat = cat;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById('nav-' + cat).classList.add('active');
      applyFilters();
    }

    // ── VIEW ──────────────────────────────────────────────────────────────
    function setView(view) {
      activeView = view;
      document.getElementById('btn-browse').classList.toggle('active', view === 'browse');
      document.getElementById('btn-gallery').classList.toggle('active', view === 'gallery');
      document.getElementById('viewer-panel').style.display  = view === 'browse'  ? 'flex' : 'none';
      document.getElementById('gallery-panel').style.display = view === 'gallery' ? 'block' : 'none';
      if (view === 'gallery') renderGallery();
    }

    // ── DATE CLEAR ────────────────────────────────────────────────────────
    function clearDate() {
      document.getElementById('date-input').value = '';
      applyFilters();
    }

    // ── FILTER + SORT ─────────────────────────────────────────────────────
    function applyFilters() {
      const q    = document.getElementById('search-input').value.trim().toLowerCase();
      const sort = document.getElementById('sort-select').value;
      const date = document.getElementById('date-input').value;

      filtered = PAGES.filter(p => {
        if (activeCat !== 'all' && p.category !== activeCat) return false;
        if (q && !p.title.toLowerCase().includes(q) && !p.desc.toLowerCase().includes(q)) return false;
        if (date && p.date !== date) return false;
        return true;
      });

      filtered.sort((a, b) => {
        if (sort === 'date-desc') return b.date.localeCompare(a.date);
        if (sort === 'date-asc')  return a.date.localeCompare(b.date);
        if (sort === 'name-asc')  return a.title.localeCompare(b.title);
        if (sort === 'name-desc') return b.title.localeCompare(a.title);
        return 0;
      });

      const n = filtered.length;
      document.getElementById('filter-count').textContent =
        n === PAGES.length ? `${n} pages` : `${n} of ${PAGES.length} pages`;

      renderList();
      if (activeView === 'gallery') renderGallery();
    }

    // ── HELPERS ───────────────────────────────────────────────────────────
    function fmtDate(s) {
      const d = new Date(s + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    }

    // ── PAGE LIST ─────────────────────────────────────────────────────────
    function renderList() {
      const el = document.getElementById('page-list');

      if (!filtered.length) {
        el.innerHTML = '<div class="no-results">No pages match your filters</div>';
        return;
      }

      let html = '';

      if (activeCat === 'all') {
        CAT_ORDER.forEach(cat => {
          const group = filtered.filter(p => p.category === cat);
          if (!group.length) return;
          html += `<div class="list-group-label">${CAT_LABEL[cat]}</div>`;
          group.forEach(p => { html += itemHTML(p); });
        });
      } else {
        filtered.forEach(p => { html += itemHTML(p); });
      }

      el.innerHTML = html;

      if (activePage) {
        const row = el.querySelector(`[data-id="${activePage.id}"]`);
        if (row) row.classList.add('active');
      }
    }

    function itemHTML(p) {
      const active = activePage && activePage.id === p.id ? ' active' : '';
      return `
        <div class="page-item${active}" data-id="${p.id}" onclick="selectPage('${p.id}')">
          <div class="pi-icon" style="background:${p.bg};">${p.icon}</div>
          <div class="pi-body">
            <div class="pi-title">${p.title}</div>
            <div class="pi-date">${fmtDate(p.date)}</div>
          </div>
        </div>`;
    }

    // ── SELECT PAGE ───────────────────────────────────────────────────────
    function selectPage(id) {
      const page = PAGES.find(p => p.id === id);
      if (!page) return;
      activePage = page;

      // Sidebar highlight
      document.querySelectorAll('.page-item').forEach(el => el.classList.remove('active'));
      const row = document.querySelector(`.page-item[data-id="${id}"]`);
      if (row) row.classList.add('active');

      // Update viewer
      const title   = document.getElementById('viewer-title');
      const crumb   = document.getElementById('viewer-crumb');
      const openBtn = document.getElementById('viewer-open');
      const frame   = document.getElementById('viewer-frame');
      const empty   = document.getElementById('viewer-empty');

      title.textContent = page.title;
      crumb.style.display = 'inline';
      openBtn.style.display = 'flex';
      openBtn.href = page.url;
      frame.src = page.url;
      frame.style.display = 'block';
      empty.style.display = 'none';

      // Update gallery active card
      document.querySelectorAll('.gallery-card').forEach(el => {
        el.classList.toggle('active', el.dataset.id === id);
      });

      // Switch to browse
      if (activeView !== 'browse') setView('browse');
    }

    // ── GALLERY ───────────────────────────────────────────────────────────
    function renderGallery() {
      const container = document.getElementById('gallery-content');

      if (!filtered.length) {
        container.innerHTML = '<div class="no-results">No pages match your filters</div>';
        return;
      }

      let html = '';

      if (activeCat === 'all') {
        CAT_ORDER.forEach(cat => {
          const group = filtered.filter(p => p.category === cat);
          if (!group.length) return;
          html += `<div class="gallery-section-title">${CAT_LABEL[cat]}</div>`;
          html += `<div class="gallery-grid">${group.map(p => cardHTML(p)).join('')}</div>`;
        });
      } else {
        html += `<div class="gallery-grid">${filtered.map(p => cardHTML(p)).join('')}</div>`;
      }

      container.innerHTML = html;

      // Restore active card
      if (activePage) {
        const card = container.querySelector(`.gallery-card[data-id="${activePage.id}"]`);
        if (card) card.classList.add('active');
      }

      // Lazy-load thumbnails with IntersectionObserver + ResizeObserver
      const io = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (!entry.isIntersecting) return;
          const scaler = entry.target;
          const iframe = scaler.querySelector('iframe');
          if (iframe && !iframe.src) {
            iframe.src = scaler.dataset.src;
          }
          io.unobserve(scaler);
        });
      }, { rootMargin: '300px' });

      const ro = new ResizeObserver(entries => {
        entries.forEach(entry => {
          const thumb  = entry.target;
          const scaler = thumb.querySelector('.thumb-scaler');
          if (scaler) scaler.style.transform = `scale(${thumb.offsetWidth / 1280})`;
        });
      });

      container.querySelectorAll('.card-thumb').forEach(thumb => {
        const scaler = thumb.querySelector('.thumb-scaler');
        if (scaler) {
          // Set initial scale
          scaler.style.transform = `scale(${thumb.offsetWidth / 1280})`;
          io.observe(scaler);
        }
        ro.observe(thumb);
      });
    }

    function cardHTML(p) {
      const active = activePage && activePage.id === p.id ? ' active' : '';
      return `
        <div class="gallery-card${active}" data-id="${p.id}" onclick="selectPage('${p.id}')">
          <div class="card-thumb">
            <div class="thumb-scaler" data-src="${p.url}">
              <iframe src="" loading="lazy" title="${p.title}"></iframe>
            </div>
            <a class="card-open-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="Open in new tab">↗</a>
          </div>
          <div class="card-body">
            <div class="card-title">${p.title}</div>
            <div class="card-meta">
              <span class="card-tag t-${p.category}">${CAT_LABEL[p.category]}</span>
              <span class="card-date">${fmtDate(p.date)}</span>
            </div>
          </div>
        </div>`;
    }
  </script>
