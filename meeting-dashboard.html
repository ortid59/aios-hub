      --ink-dim:      #64748B;
      --ink-faint:    #94A3B8;
      --border:       rgba(15, 23, 42, 0.08);
      --border-hover: rgba(15, 23, 42, 0.18);

      --blue:         #1D4ED8;
      --blue-light:   #EFF6FF;
      --blue-mid:     #BFDBFE;
      --teal:         #0D9488;
      --teal-light:   #F0FDFA;
      --teal-mid:     #99F6E4;
      --gold:         #B45309;
      --gold-light:   #FFFBEB;
      --gold-mid:     #FDE68A;

      --font-mono: 'Geist Mono', monospace;

      --ease-spring: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--base);
      color: var(--ink);
      margin: 0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Section header — ux-jonny signature */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-header span {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      white-space: nowrap;
    }
    .section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Hairline divider — sunplanet */
    .hairline {
      width: 100%;
      height: 1px;
      background: var(--ink);
      opacity: 0.07;
    }

    /* Stats card */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      transition: box-shadow 0.25s ease, border-color 0.25s ease;
    }
    .stat-card:hover {
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.08);
      border-color: var(--border-hover);
    }

    /* Meeting row */
    .meeting-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }
    .meeting-row:hover {
      border-color: var(--border-hover);
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.07);
      transform: translateY(-1px);
    }
    .meeting-row.active {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.08), 0 4px 16px rgba(15, 23, 42, 0.07);
    }
    .meeting-row .active-bar {
      position: absolute;
      left: 0; top: 12px; bottom: 12px;
      width: 3px;
      background: var(--blue);
      border-radius: 0 2px 2px 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .meeting-row.active .active-bar { opacity: 1; }

    /* Source badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 100px;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .badge-fireflies { background: var(--blue-light); color: var(--blue); border: 1px solid var(--blue-mid); }
    .badge-notion    { background: var(--teal-light); color: var(--teal); border: 1px solid var(--teal-mid); }
    .badge-manual    { background: var(--gold-light); color: var(--gold); border: 1px solid var(--gold-mid); }
    .badge-fathom    { background: #F0FDFA; color: #0D9488; border: 1px solid #99F6E4; }

    /* Detail pane */
    #detail-pane {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 440px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform var(--ease-spring);
      z-index: 50;
      overflow-y: auto;
      box-shadow: -8px 0 40px rgba(15, 23, 42, 0.08);
    }
    #detail-pane.open {
      transform: translateX(0);
    }

    /* Filter pill */
    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: 100px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .filter-pill:hover { border-color: var(--border-hover); color: var(--ink); }
    .filter-pill.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* Search */
    .search-input {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px 7px 32px;
      color: var(--ink);
      outline: none;
      width: 220px;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--blue); }
    .search-input::placeholder { color: var(--ink-faint); }

    /* Staggered reveal */
    .reveal {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.55s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.in { opacity: 1; transform: none; }

    /* Action item */
    .action-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
    }
    .action-item + .action-item { border-top: 1px solid var(--border); }
    .action-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    /* Duration bar */
    .duration-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--blue) 0%, var(--teal) 100%);
      border-radius: 2px;
    }

    /* Owner group header in detail */
    .owner-group {
      margin-bottom: 16px;
    }
    .owner-label {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      padding: 2px 8px;
      border-radius: 100px;
      display: inline-block;
      margin-bottom: 8px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

  </style>
</head>

    "summary": "The team discussed utilizing a Mac Mini as a 24/7 server for AI OS projects, enabling remote access and seamless collaboration. Richard emphasized continuous operation and scheduled jobs, while David plans to sync project directories with iCloud for device interoperability. Concurrent access is facilitated through separate user accounts on the Mac Mini, allowing multiple users to work simultaneously. Tools like Jump Desktop will enable Windows users to connect, avoiding additional VPS costs. The team outlined client onboarding timelines, which range from 1 to 5 days, and emphasized targeting non-technical clients for sustained business. Additionally, a $100/month Claude account is recommended for reliable performance, and efforts are ongoing to develop a SaaS platform for skill-sharing while addressing security concerns.",
    "action_items": []
  },
  {
    "id": 12,
    "meeting_id": "fireflies_01KP5TDS5AFT1800X8MSBCSB0W",
    "source": "fireflies",
    "title": "David Ortiz and Kevin Taheryan",
    "date": "2026-04-14",
    "duration_minutes": 1,
    "fathom_url": "",
    "summary": "David Ortiz is focused on transitioning his AI business into a scalable model, targeting $50,000 in monthly revenue to support his lifestyle and personal goals, including relocating to Lisbon. Currently generating about $6,000 monthly, David is shifting from one-off projects to a stable recurring revenue model. He has committed to the AAA accelerator program, which offers extensive support, including access to AI experts and coaching. A key focus will be developing a clear, repeatable offer for clients, as well as refining pricing models. The program's structure aims to mitigate risks associated with his market positioning and help establish a strong, client-focused business strategy.",
    "action_items": []
  },
  {
    "id": 13,
    "meeting_id": "notion_33b03758-d6de-804c-9385-ee0531915991",
    "source": "notion",
    "title": "Daniel Pail's Availability (Tours)",
    "date": "2026-04-07",
    "duration_minutes": 30,
    "fathom_url": "",
    "summary": "",
    "action_items": []
  }
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let activeFilter = 'all';
let activeId = null;
let searchQuery = '';

// ─── DOM REFS ─────────────────────────────────────────────────────────────────
const list = document.getElementById('meeting-list');
const detailPane = document.getElementById('detail-pane');
const detailContent = document.getElementById('detail-content');
const overlay = document.getElementById('overlay');
const closeBtn = document.getElementById('close-pane');
const searchInput = document.getElementById('search-input');

// ─── UTILS ────────────────────────────────────────────────────────────────────
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function daysAgo(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const today = new Date();
  const diff = Math.round((today - d) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7) return `${diff}d ago`;
  if (diff < 30) return `${Math.round(diff/7)}w ago`;
  return `${Math.round(diff/30)}mo ago`;
}
function sourceBadge(source) {
  const map = {
    fireflies: ['badge-fireflies', 'Fireflies'],
    fathom:    ['badge-fathom',     'Fathom'],
    fathom:    ['badge-fathom',     'Fathom'],
    notion:    ['badge-notion', 'Notion'],
    manual:    ['badge-manual', 'Manual'],
  };
  const [cls, label] = map[source] || map.manual;
  return `<span class="badge ${cls}">${label}</span>`;
}
function durationLabel(min) {
  if (!min) return '—';
  if (min < 60) return `${min}m`;
  return `${Math.floor(min/60)}h ${min%60}m`;
}
function isMe(owner) {
  return owner.toLowerCase().includes('david');
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function renderStats() {
  const total = MEETINGS.length;
  const now = new Date();
  const thisMonth = MEETINGS.filter(m => {
    const d = new Date(m.date + 'T12:00:00');
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
  const durations = MEETINGS.filter(m => m.duration_minutes).map(m => m.duration_minutes);
  const avgDur = durations.length ? Math.round(durations.reduce((a,b)=>a+b,0)/durations.length) : 0;
  const totalActions = MEETINGS.reduce((sum, m) => sum + (m.action_items?.length || 0), 0);

  animateCount('stat-total', total);
  animateCount('stat-week', thisMonth);
  animateCount('stat-duration', avgDur);
  animateCount('stat-actions', totalActions);

  document.getElementById('stat-month-label').textContent =
    now.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}
function animateCount(id, target) {
  const el = document.getElementById(id);
  let start = 0;
  const step = () => {
    start += Math.ceil((target - start) / 6);
    el.textContent = start;
    if (start < target) requestAnimationFrame(step);
    else el.textContent = target;
  };
  setTimeout(step, 300);
}

// ─── LIST ─────────────────────────────────────────────────────────────────────
function getFiltered() {
  return MEETINGS.filter(m => {
    const matchSource = activeFilter === 'all' || m.source === activeFilter;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || m.title.toLowerCase().includes(q) || (m.summary||'').toLowerCase().includes(q);
    return matchSource && matchSearch;
  });
}

function renderList() {
  const filtered = getFiltered();
  list.innerHTML = '';

  if (!filtered.length) {
    list.innerHTML = `<div style="text-align:center;padding:48px;color:var(--ink-faint);">
      <div class="font-mono" style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;">No meetings match your filter</div>
    </div>`;
    return;
  }

  const maxDur = Math.max(...MEETINGS.map(x => x.duration_minutes || 0));

  filtered.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = `meeting-row reveal ${m.id === activeId ? 'active' : ''}`;
    el.style.transitionDelay = `${i * 40}ms`;
    el.dataset.id = m.id;

    const barWidth = m.duration_minutes ? Math.round((m.duration_minutes / maxDur) * 100) : 0;
    const actionCount = m.action_items?.length || 0;
    const myActions = m.action_items?.filter(a => isMe(a.owner)).length || 0;

    el.innerHTML = `
      <div class="active-bar"></div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            ${sourceBadge(m.source)}
            <span class="font-mono" style="font-size:9px;color:var(--ink-faint);">${daysAgo(m.date)} · ${formatDate(m.date)}</span>
          </div>
          <div style="font-size:14px;font-weight:500;letter-spacing:-0.01em;line-height:1.35;margin-bottom:8px;color:var(--ink);">${m.title}</div>
          ${m.summary ? `<div style="font-size:12px;color:var(--ink-dim);line-height:1.5;font-family:var(--font-mono);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${m.summary}</div>` : '<div class="font-mono" style="font-size:11px;color:var(--ink-faint);font-style:italic;">No summary available</div>'}
        </div>
        <div style="flex-shrink:0;text-align:right;">
          <div style="font-size:16px;font-weight:600;letter-spacing:-0.02em;color:var(--ink);">${durationLabel(m.duration_minutes)}</div>
          ${actionCount ? `
          <div class="font-mono" style="font-size:9px;color:var(--ink-faint);margin-top:2px;">${actionCount} actions</div>
          ${myActions ? `<div class="font-mono" style="font-size:9px;color:var(--blue);margin-top:1px;">${myActions} mine</div>` : ''}
          ` : '<div class="font-mono" style="font-size:9px;color:var(--ink-faint);margin-top:2px;">no actions</div>'}
        </div>
      </div>
      ${m.duration_minutes ? `
      <div style="margin-top:12px;">
        <div style="width:${barWidth}%;max-width:100%;" class="duration-bar"></div>
      </div>` : ''}
    `;

    el.addEventListener('click', () => openDetail(m.id));
    list.appendChild(el);

    requestAnimationFrame(() => {
      setTimeout(() => el.classList.add('in'), i * 40);
    });
  });
}

// ─── DETAIL PANE ──────────────────────────────────────────────────────────────
function openDetail(id) {
  const m = MEETINGS.find(x => x.id === id);
  if (!m) return;
  activeId = id;

  document.querySelectorAll('.meeting-row').forEach(r => {
    r.classList.toggle('active', parseInt(r.dataset.id) === id);
  });

  // Group action items by owner
  const owners = {};
  (m.action_items || []).forEach(a => {
    if (!owners[a.owner]) owners[a.owner] = [];
    owners[a.owner].push(a.text);
  });

  const actionHTML = Object.entries(owners).map(([owner, items]) => {
    const mine = isMe(owner);
    const color = mine ? 'var(--blue)' : 'var(--teal)';
    const bg = mine ? 'var(--blue-light)' : 'var(--teal-light)';
    return `
      <div class="owner-group">
        <span class="owner-label" style="color:${color};background:${bg};">${owner}</span>
        ${items.map(text => `
          <div class="action-item">
            <div class="action-dot" style="background:${color};"></div>
            <div class="font-mono" style="font-size:11px;color:var(--ink-dim);line-height:1.6;">${text}</div>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');

  detailContent.innerHTML = `
    <div style="margin-bottom:20px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        ${sourceBadge(m.source)}
        <span class="font-mono" style="font-size:9px;color:var(--ink-faint);">${formatDate(m.date)}</span>
      </div>
      <h2 style="font-size:16px;font-weight:600;letter-spacing:-0.02em;line-height:1.3;margin-bottom:16px;">${m.title}</h2>
      <div style="display:flex;gap:12px;">
        <div style="background:var(--base);border-radius:8px;padding:10px 14px;flex:1;">
          <div class="font-mono" style="font-size:9px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px;">Duration</div>
          <div style="font-size:20px;font-weight:700;letter-spacing:-0.02em;">${durationLabel(m.duration_minutes)}</div>
        </div>
        <div style="background:var(--base);border-radius:8px;padding:10px 14px;flex:1;">
          <div class="font-mono" style="font-size:9px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px;">Actions</div>
          <div style="font-size:20px;font-weight:700;letter-spacing:-0.02em;">${m.action_items?.length || 0}</div>
        </div>
        <div style="background:var(--blue-light);border-radius:8px;padding:10px 14px;flex:1;">
          <div class="font-mono" style="font-size:9px;color:var(--blue);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px;">Mine</div>
          <div style="font-size:20px;font-weight:700;letter-spacing:-0.02em;color:var(--blue);">${m.action_items?.filter(a => isMe(a.owner)).length || 0}</div>
        </div>
      </div>
    </div>

    <div class="hairline" style="margin-bottom:20px;"></div>

    ${m.summary ? `
    <div style="margin-bottom:24px;">
      <div class="section-header" style="margin-bottom:12px;"><span>Summary</span></div>
      <p class="font-mono" style="font-size:11px;line-height:1.75;color:var(--ink-dim);">${m.summary}</p>
    </div>
    ` : ''}

    ${m.action_items?.length ? `
    <div>
      <div class="section-header" style="margin-bottom:16px;"><span>Action Items</span></div>
      ${actionHTML}
    </div>
    ` : `
    <div style="text-align:center;padding:32px 0;">
      <div class="font-mono" style="font-size:10px;color:var(--ink-faint);letter-spacing:0.1em;text-transform:uppercase;">No action items recorded</div>
    </div>
    `}
  `;

  detailPane.classList.add('open');
  overlay.style.opacity = '1';
  overlay.style.pointerEvents = 'auto';
}

function closeDetail() {
  detailPane.classList.remove('open');
  overlay.style.opacity = '0';
  overlay.style.pointerEvents = 'none';
  activeId = null;
  document.querySelectorAll('.meeting-row').forEach(r => r.classList.remove('active'));
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
closeBtn.addEventListener('click', closeDetail);
overlay.addEventListener('click', closeDetail);

document.querySelectorAll('.filter-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  });
});

searchInput.addEventListener('input', e => {
  searchQuery = e.target.value;
  renderList();
});

// ─── DATE ─────────────────────────────────────────────────────────────────────
document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', {
  weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
requestAnimationFrame(() => {
  document.querySelectorAll('.reveal').forEach((el, i) => {
    setTimeout(() => el.classList.add('in'), 80 + i * 80);
  });
});

renderStats();
renderList();
</script>
</body>
</html>
